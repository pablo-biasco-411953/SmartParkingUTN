version: '3.8'

services:
  cassandra-utn:
    image: cassandra:latest
    container_name: cassandra-utn
    ports:
      - "9042:9042"
    volumes:
      - ./cassandra-data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe cluster' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  neo4j-utn-final-ok:
    image: neo4j:latest
    container_name: neo4j-utn-final-ok
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password123
    volumes:
      - ./neo4j-data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password123", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  smart-parking-backend:
    build: ./smart-parking-utn
    container_name: smart-parking-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_NEO4J_URI=bolt://neo4j-utn-final-ok:7687
      - SPRING_CASSANDRA_CONTACT_POINTS=cassandra-utn:9042
    depends_on:
      cassandra-utn:
        condition: service_healthy
      neo4j-utn-final-ok:
        condition: service_healthy

  smart-parking-frontend:
    build: ./smart-parking-front
    container_name: smart-parking-frontend
    ports:
      - "3000:80"
    depends_on:
      - smart-parking-backend
