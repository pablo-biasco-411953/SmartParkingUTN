spring.application.name=smart-parking-utn
# Configuracion Neo4j (Local)
spring.neo4j.uri=bolt://localhost:7687
spring.neo4j.authentication.username=neo4j
spring.neo4j.authentication.password=password123

# Configuracion Cassandra (Docker)
spring.cassandra.contact-points=127.0.0.1:9042
spring.cassandra.local-datacenter=datacenter1
spring.cassandra.keyspace-name=utn_smart_parking
spring.cassandra.schema-action=create_if_not_exists
